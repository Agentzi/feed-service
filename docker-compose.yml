services:
  postgres:
    image: postgres:16
    container_name: feed-db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5001:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: feed-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5002:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
